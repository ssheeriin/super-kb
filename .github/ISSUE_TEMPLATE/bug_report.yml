name: Bug Report
description: Report a defect or regression in SKB
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: SKB version
      description: Output of `skb-mcp-server version`
      placeholder: 0.2.2
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Claude Code version, and install method
      placeholder: macOS 14, Claude Code 2.x, installer script
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install SKB
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or command output
      render: shell
