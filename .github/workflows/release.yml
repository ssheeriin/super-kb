name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test] build

      - name: Run syntax checks
        run: |
          python -m py_compile skb/*.py skb/chunkers/*.py tests/*.py scripts/*.py

      - name: Run test suite
        run: |
          pytest -q

  build-python-artifacts:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Tag {tag!r} does not match pyproject version {version!r}. "
                  f"Expected tag {expected!r}."
              )
          print(f"Release tag {tag} matches project version {version}.")
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Create stable wheel alias
        run: |
          set -eu
          wheel_count=$(find dist -maxdepth 1 -name '*.whl' | wc -l | tr -d ' ')
          if [ "${wheel_count}" != "1" ]; then
            echo "Expected exactly one wheel in dist/, found ${wheel_count}."
            exit 1
          fi
          wheel_path=$(find dist -maxdepth 1 -name '*.whl' -print)
          cp "${wheel_path}" dist/skb_mcp_server-0-py3-none-any.whl

      - name: Upload Python distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  build-standalone-binaries:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform-id: linux-x64
            smoke-command: dist/pyinstaller/linux-x64/skb-mcp-server/skb-mcp-server
          - os: macos-15-intel
            platform-id: macos-x64
            smoke-command: dist/pyinstaller/macos-x64/skb-mcp-server/skb-mcp-server
          - os: macos-14
            platform-id: macos-arm64
            smoke-command: dist/pyinstaller/macos-arm64/skb-mcp-server/skb-mcp-server
          - os: windows-latest
            platform-id: windows-x64
            smoke-command: dist\\pyinstaller\\windows-x64\\skb-mcp-server\\skb-mcp-server.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Build standalone bundle
        run: |
          python scripts/build_binary.py --platform-id "${{ matrix.platform-id }}" --output-dir release-dist

      - name: Smoke test standalone bundle
        shell: bash
        run: |
          "${{ matrix.smoke-command }}" version --json
          tmpdir=$(mktemp -d)
          "${{ matrix.smoke-command }}" write-mcp-config --project-root "$tmpdir" --json
          "${{ matrix.smoke-command }}" doctor --project-root "$tmpdir" --json || true

      - name: Upload standalone release assets
        uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ matrix.platform-id }}
          path: release-dist/*

  create-release:
    needs:
      - build-python-artifacts
      - build-standalone-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Include installer scripts
        run: |
          cp install.sh release-assets/install.sh
          cp install.ps1 release-assets/install.ps1
          cp uninstall.sh release-assets/uninstall.sh
          cp uninstall.ps1 release-assets/uninstall.ps1

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          notes=$(cat <<'EOF'
          Standalone bundle status for this release:
          - macOS bundles were clean-room tested against the public release flow.
          - Linux and Windows standalone bundles are alpha and currently have CI smoke coverage only.
          EOF
          )
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/* \
            --verify-tag \
            --generate-notes \
            --notes "$notes"
