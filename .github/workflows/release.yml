name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest build

      - name: Run syntax checks
        run: |
          python -m py_compile skb/*.py skb/chunkers/*.py tests/*.py

      - name: Run test suite
        run: |
          pytest -q

  build-and-release:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Tag {tag!r} does not match pyproject version {version!r}. "
                  f"Expected tag {expected!r}."
              )
          print(f"Release tag {tag} matches project version {version}.")
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build distribution artifacts
        run: |
          python -m build

      - name: Generate SHA256 checksums
        run: |
          sha256sum dist/* > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            SHA256SUMS.txt \
            --verify-tag \
            --generate-notes
